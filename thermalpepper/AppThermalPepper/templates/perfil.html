{% extends "base.html" %}

{% load static %}

{% block title %}
Meu Perfil - Thermal Pepper
{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

```
<div>

    <h2 class="fw-bold">

        <i class="bi bi-person-circle text-success"></i>

        Meu Perfil

    </h2>


    <p class="text-muted">

        Gerencie suas informações pessoais

    </p>


</div>
```

</div>

<div class="row g-4">

```
<div class="col-md-4">


    <div class="card p-4 text-center">


        <i class="bi bi-person-circle"

           style="font-size:100px;color:#198754;"></i>



        <h4 class="mt-3">

            Bruno

        </h4>


        <p class="text-muted">

            Administrador

        </p>


        <span class="badge bg-success">

            Acesso total

        </span>


    </div>


</div>








<div class="col-md-8">


    <div class="card p-4">


        <h5 class="fw-bold mb-4">

            Informações pessoais

        </h5>




        <div class="row g-3">


            <div class="col-md-6">


                <label class="form-label">

                    Nome

                </label>


                <input class="form-control"

                       value="Bruno">


            </div>




            <div class="col-md-6">


                <label class="form-label">

                    Sobrenome

                </label>


                <input class="form-control"

                       value="Rodrigues">


            </div>




            <div class="col-md-6">


                <label class="form-label">

                    E-mail

                </label>


                <input class="form-control"

                       value="bruno@email.com">


            </div>




            <div class="col-md-6">


                <label class="form-label">

                    Telefone

                </label>


                <input class="form-control"

                       value="(64) 99999-9999">


            </div>




            <div class="col-md-6">


                <label class="form-label">

                    Cargo

                </label>


                <input class="form-control"

                       value="Administrador">


            </div>




            <div class="col-md-6">


                <label class="form-label">

                    Nível de acesso

                </label>


                <input class="form-control"

                       value="Administrador"

                       disabled>


            </div>



        </div>




        <button class="btn btn-success mt-4">

            <i class="bi bi-check-circle"></i>

            Salvar alterações

        </button>



    </div>


</div>
```

</div>
